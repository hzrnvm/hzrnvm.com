<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Millennium time</title>
  <link href="../style.css" rel="stylesheet" type="text/css" media="all">
  <style>
    body {
        background: black;
    }
    
    h2 {
        position: absolute;
        left: 50%;
        text-align: center;
        top: 50%;
        font-size: 8em;
        transform: translate(-50%,-50%);
        margin: 0;
        color: #0ff;
        font-weight: normal;
        width: 100vw;
    }

    @media (max-width:960px) {
      h2 {
          font-size: 4rem;
      }
    }
  </style>
</head>
<body>
  <h2 id="dowy"></h2>
  <script>
    const today = new Date();
    let day = 0;
    const daofye = date => (Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) - Date.UTC(date.getFullYear(), 0, 0)) / 86400000;
    const millDate = (date, year = (date.getFullYear() % 100)) => ((Math.floor(year / 4) * 1461) + ((year % 4) * 365 + 1)) + daofye(date);
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]

    function showDate() {
      document.getElementById('dowy').innerHTML = `${days[day]}, <a href="./tool.html">${millDate(today)}</a>`;
    }
  </script>
</body>
</html>
